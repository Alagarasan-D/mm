<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>✨ CS-MEMORIES</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height:100vh;
      background:radial-gradient(circle at 30% 30%,#1a1e2f,#0b0d17);
      display:flex; align-items:center; justify-content:center;
      font-family:'Segoe UI',system-ui,'Helvetica Neue',sans-serif;
      padding:1rem;
    }

    /* ── RESPONSIVE BASE ── */
    .loader-card {
      background:rgba(18,22,40,0.65);
      backdrop-filter:blur(14px) saturate(180%);
      -webkit-backdrop-filter:blur(14px) saturate(180%);
      border-radius:3.5rem 3.5rem 2.5rem 2.5rem;
      box-shadow:0 30px 60px -10px rgba(0,0,0,0.8),
                 inset 0 1px 2px rgba(255,255,255,0.08),
                 0 0 0 1px rgba(120,160,255,0.15);
      padding:2.5rem 2.5rem 6rem 2.5rem;
      width:min(520px,96vw);
      border:1px solid rgba(110,150,255,0.2);
      position:relative;
    }

    /* ── TITLE ── */
    .title-section {
      text-align:center; margin-bottom:2rem; position:relative;
    }

    .title-section h1 {
      font-size:clamp(1.2rem,5vw,2.2rem);
      font-weight:500; letter-spacing:2px;
      background:linear-gradient(130deg,#c0d4ff,#a6b9ff,#c0e1ff);
      -webkit-background-clip:text; background-clip:text;
      color:transparent;
      text-shadow:0 0 12px #3f6eff55,0 0 25px #2f4fef30;
      margin-bottom:0.4rem; position:relative; z-index:3;
      line-height:1.3;
    }

    .glow-sub {
      font-size:clamp(0.65rem,2.5vw,0.9rem);
      font-weight:300; color:#9bb3ffcc;
      text-transform:uppercase; word-spacing:4px;
    }

    /* ── RING ── */
    .ring-wrapper {
      display:flex; justify-content:center; align-items:center;
      margin:1.5rem 0 1.8rem 0;
      filter:drop-shadow(0 0 18px #3f7eff70);
    }

    .progress-ring {
      position:relative;
      width:clamp(140px,45vw,180px);
      height:clamp(140px,45vw,180px);
    }

    .progress-ring svg {
      position:relative;
      width:100%; height:100%;
      transform:rotate(-90deg);
    }

    .progress-ring circle { fill:none; stroke-width:8; stroke-linecap:round; }
    .ring-bg { stroke:rgba(50,65,110,0.4); stroke-width:8; }
    .ring-fill {
      stroke:url(#shimmerGradient); stroke-width:9;
      filter:drop-shadow(0 0 9px #4d7cff) drop-shadow(0 0 18px #2d4fcf);
      stroke-dasharray:502.4; stroke-dashoffset:502.4;
      transition:stroke-dashoffset 0.35s cubic-bezier(0.34,1.5,0.64,1);
    }

    .percentage-badge {
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      justify-content:center; align-items:center;
      color:white; font-weight:500;
    }

    .percent-big {
      font-size:clamp(2.2rem,10vw,3.3rem);
      font-weight:600;
      background:linear-gradient(145deg,#ffffff,#d6e4ff);
      -webkit-background-clip:text; background-clip:text;
      color:transparent; line-height:1;
      animation:softPulse 2.2s infinite alternate;
    }



    /* ── PULSE BAR ── */
    .pulse-bar {
      width:min(220px,70%);
      height:5px;
      background:linear-gradient(90deg,transparent,#6f96ff,#aac3ff,#6f96ff,transparent);
      margin:0.8rem auto 1.4rem auto;
      border-radius:10px; opacity:0.7;
      animation:barShimmer 2.8s infinite linear;
      background-size:200% 100%;
    }

    /* ── FINGERPRINT SENSOR ── */
    .fingerprint-sensor {
      position:absolute;
      bottom:clamp(10px,3vh,18px);
      left:50%; transform:translateX(-50%);
      display:flex; flex-direction:column;
      align-items:center; gap:7px;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      user-select:none; z-index:20;
    }

    /* PRESS HERE label */
    .press-label {
      font-size:clamp(0.55rem,1.8vw,0.7rem);
      letter-spacing:0.3em;
      color:rgba(160,195,255,0.7);
      text-transform:uppercase;
      font-family:'Segoe UI',sans-serif;
      text-align:center;
      animation:labelPulse 2s ease-in-out infinite alternate;
      white-space:nowrap;
    }
    @keyframes labelPulse {
      0% { opacity:0.5; color:rgba(160,195,255,0.5); }
      100%{ opacity:1;   color:rgba(200,220,255,0.9); text-shadow:0 0 12px #6f96ff; }
    }

    /* Fingerprint circle */
    .fp-circle {
      width:clamp(56px,14vw,70px);
      height:clamp(56px,14vw,70px);
      border-radius:50%;
      background:rgba(30,40,70,0.7);
      backdrop-filter:blur(10px);
      border:2px solid rgba(100,150,255,0.5);
      box-shadow:0 0 20px rgba(70,130,255,0.4);
      display:flex; align-items:center; justify-content:center;
      transition:all 0.3s ease;
      animation:fingerprintPulse 2.5s infinite alternate;
    }

    .fingerprint-sensor:hover .fp-circle {
      border-color:#7f9eff;
      box-shadow:0 0 40px #3f7bff,0 0 80px #1f3a8a;
      transform:scale(1.08);
    }
    .fingerprint-sensor:active .fp-circle { transform:scale(0.95); }

    /* SVG fingerprint lines */
    .fp-svg {
      width:clamp(32px,8vw,40px);
      height:clamp(32px,8vw,40px);
    }

    /* fingerprint pressed state */
    .fingerprint-sensor.pressed .fp-circle {
      border-color:#ffaa33;
      box-shadow:0 0 60px #ffaa33,0 0 120px #ff7700;
      transform:scale(1.1);
    }

    /* floating orbs */
    .energy-dots {
      position:absolute; top:0; left:0;
      width:100%; height:100%;
      pointer-events:none; overflow:hidden;
      border-radius:inherit;
    }
    .energy-dots span {
      position:absolute;
      width:6px; height:6px;
      border-radius:50%;
      animation:floatDot 7s infinite alternate ease-in-out;
    }

    /* ── MASS EFFECT ANIMATIONS ── */
    .mass-effect-ripple {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:clamp(56px,14vw,70px); height:clamp(56px,14vw,70px);
      border-radius:50%;
      background:rgba(100,150,255,0.3);
      box-shadow:0 0 50px #4d7cff,0 0 100px #1f4dff;
      animation:massExpand 0.8s ease-out forwards;
      pointer-events:none; z-index:25;
    }
    .mass-effect-wave {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:clamp(56px,14vw,70px); height:clamp(56px,14vw,70px);
      border:3px solid rgba(255,255,255,0.6);
      border-radius:50%;
      box-shadow:0 0 40px #7f9eff,inset 0 0 40px #3f7bff;
      animation:massWave 1.2s infinite;
      pointer-events:none; z-index:26;
    }
    .mass-effect-particle {
      position:absolute; width:8px; height:8px;
      background:#aac3ff; border-radius:50%;
      box-shadow:0 0 30px #4d7cff;
      pointer-events:none; z-index:30;
      animation:particleFly 1s ease-out forwards;
    }

    /* ── KEYFRAMES ── */
    @keyframes softPulse {
      0%  { opacity:0.9; text-shadow:0 0 15px #5b80ff,0 0 30px #2643b3; }
      100%{ opacity:1;   text-shadow:0 0 25px #96b2ff,0 0 55px #3e68ff; }
    }
    @keyframes barShimmer {
      0%  { background-position:0% 0; }
      100%{ background-position:200% 0; }
    }
    @keyframes floatDot {
      0%  { transform:translate(0,0) scale(1); opacity:0.2; }
      50% { transform:translate(20px,-15px) scale(1.6); opacity:0.7; }
      100%{ transform:translate(-20px,25px) scale(1); opacity:0.3; }
    }
    @keyframes fingerprintPulse {
      0%  { box-shadow:0 0 20px rgba(70,130,255,0.4),0 0 40px rgba(40,80,200,0.2); }
      100%{ box-shadow:0 0 50px rgba(70,130,255,0.8),0 0 100px rgba(40,80,200,0.4); }
    }
    @keyframes massExpand {
      0%  { width:clamp(56px,14vw,70px); height:clamp(56px,14vw,70px); opacity:0.8; }
      100%{ width:200px; height:200px; opacity:0; }
    }
    @keyframes massWave {
      0%  { width:clamp(56px,14vw,70px); height:clamp(56px,14vw,70px); opacity:0.8; border-width:3px; }
      100%{ width:180px; height:180px; opacity:0; border-width:1px; }
    }
    @keyframes particleFly {
      0%  { transform:translate(0,0) scale(1); opacity:1; }
      100%{ transform:translate(var(--x,100px),var(--y,-100px)) scale(0); opacity:0; }
    }

    /* ── MOBILE TWEAKS ── */
    @media(max-width:400px){
      .loader-card { padding:2rem 1.5rem 5.5rem 1.5rem; border-radius:2.5rem 2.5rem 2rem 2rem; }
      .title-section h1 { letter-spacing:1px; }
    }
  
    /* ── TYPEWRITER MESSAGE BOX ── */
    .tw-box {
      min-height: clamp(3.5rem, 8vh, 5rem);
      margin: 0.6rem auto 0 auto;
      width: min(420px, 90%);
      text-align: center;
      position: relative;
    }
    .tw-line {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: clamp(0.7rem, 2.2vw, 0.92rem);
      letter-spacing: 0.08em;
      line-height: 1.7;
      color: rgba(180, 210, 255, 0.75);
      opacity: 0;
      transition: opacity 0.4s ease;
      min-height: 1.4em;
    }
    .tw-line.visible { opacity: 1; }
    /* tw-cursor removed */

    /* stage indicator dots */
    .stage-dots {
      display: flex;
      justify-content: center;
      gap: clamp(5px, 1.5vw, 8px);
      margin: 0.7rem auto 0 auto;
    }
    .stage-dot {
      width: clamp(5px,1.5vw,7px);
      height: clamp(5px,1.5vw,7px);
      border-radius: 50%;
      background: rgba(80,120,200,0.3);
      border: 1px solid rgba(100,150,255,0.25);
      transition: background 0.4s, box-shadow 0.4s, transform 0.3s;
    }
    .stage-dot.lit {
      background: var(--dot-col, #5f9eff);
      box-shadow: 0 0 8px var(--dot-col, #5f9eff);
      transform: scale(1.35);
    }
  </style>
</head>
<body>
  <div class="loader-card">
    <div class="energy-dots" id="energyDots"></div>

    <!-- FINGERPRINT — PRESS HERE label + SVG icon -->
    <div class="fingerprint-sensor" id="fingerprintSensor">
      <span class="press-label"></span>
      <div class="fp-circle">
        <!-- SVG fingerprint lines -->
        <svg class="fp-svg" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="3" fill="white" opacity="0.9"/>
          <path d="M20 17 C20 17 17 14 17 11 C17 7.5 18.5 5 20 5 C21.5 5 23 7.5 23 11" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.85"/>
          <path d="M14 18 C13 16 12 13.5 12 11 C12 6 15.5 2.5 20 2.5 C24.5 2.5 28 6 28 11 C28 13.5 27 16 26 18" stroke="white" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.75"/>
          <path d="M10 21 C9 19 8.5 15 8.5 11 C8.5 4 13.5 0 20 0 C26.5 0 31.5 4 31.5 11 C31.5 15 31 19 30 21" stroke="rgba(180,210,255,0.8)" stroke-width="1.3" stroke-linecap="round" fill="none" opacity="0.65"/>
          <path d="M17 22 C16 20.5 15.5 19 15.5 17 C15.5 14 17.5 12 20 12 C22.5 12 24.5 14 24.5 17 C24.5 19 24 20.5 23 22" stroke="white" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.8"/>
          <path d="M17 26 C15.5 24 14.5 22 14 20" stroke="white" stroke-width="1.3" stroke-linecap="round" fill="none" opacity="0.7"/>
          <path d="M23 26 C24.5 24 25.5 22 26 20" stroke="white" stroke-width="1.3" stroke-linecap="round" fill="none" opacity="0.7"/>
          <path d="M19 29 C18 27 17.5 26 17 24.5" stroke="rgba(180,210,255,0.9)" stroke-width="1.3" stroke-linecap="round" fill="none" opacity="0.75"/>
          <path d="M21 29 C22 27 22.5 26 23 24.5" stroke="rgba(180,210,255,0.9)" stroke-width="1.3" stroke-linecap="round" fill="none" opacity="0.75"/>
        </svg>
      </div>
    </div>

    <!-- Title -->
    <div class="title-section">
      <h1>✦ SARAVANAN ❤️AND ❤️ ADHEESH  ✦</h1>
      <div class="glow-sub">💕❤️PRESENT ONE MORE SUPRISE👀</div>
    </div>

    <!-- Ring -->
    <div class="ring-wrapper">
      <div class="progress-ring">
        <svg viewBox="0 0 180 180">
          <defs>
            <linearGradient id="shimmerGradient" gradientUnits="objectBoundingBox" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#5f9eff">
                <animate attributeName="stop-color" values="#5f9eff;#a7c5ff;#5f9eff" dur="4s" repeatCount="indefinite"/>
              </stop>
              <stop offset="50%" stop-color="#bfdaff">
                <animate attributeName="stop-color" values="#bfdaff;#ffffff;#bfdaff" dur="5s" repeatCount="indefinite"/>
              </stop>
              <stop offset="100%" stop-color="#3f74ee">
                <animate attributeName="stop-color" values="#3f74ee;#7b9eff;#3f74ee" dur="4.5s" repeatCount="indefinite"/>
              </stop>
              <animate attributeName="x1" values="0;0.4;0" dur="6s" repeatCount="indefinite"/>
              <animate attributeName="y1" values="0;0.7;0" dur="7s" repeatCount="indefinite"/>
            </linearGradient>
            <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
              <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <circle class="ring-bg" cx="90" cy="90" r="80"/>
          <circle class="ring-fill" cx="90" cy="90" r="80" style="stroke-dasharray:502.4;stroke-dashoffset:502.4;"/>
        </svg>
        <div class="percentage-badge">
          <span class="percent-big" id="percentDisplay">0<span style="font-size:2rem;">%</span></span>

        </div>
      </div>
    </div>

    <!-- Pulse bar -->
    <div class="pulse-bar"></div>


    <!-- TYPEWRITER MESSAGE -->
    <div class="tw-box">
      <div class="tw-line" id="twLine"></div>
    </div>

    <!-- STAGE DOTS -->
    <div class="stage-dots" id="stageDots">
      <div class="stage-dot" id="dot0"></div>
      <div class="stage-dot" id="dot1"></div>
      <div class="stage-dot" id="dot2"></div>
      <div class="stage-dot" id="dot3"></div>
      <div class="stage-dot" id="dot4"></div>
      <div class="stage-dot" id="dot5"></div>
    </div>

    <!-- NO SLIDER — removed as requested -->

  </div>

  <script>
    (function() {
      const radius = 80;
      const circumference = 2 * Math.PI * radius;

      const ringFill       = document.querySelector('.ring-fill');
      const percentDisplay = document.getElementById('percentDisplay');

      let currentProgress = 0;
      let increaseInterval = null;
      let decreaseInterval = null;
      const enableRedirection = true;


      // ── TYPEWRITER MESSAGES per stage ──
      const stageMessages = [
        { at:  0, msg: 'Hold the fingerprint sensor to begin your journey... ✨',      col:'#5f9eff' },
        { at: 20, msg: 'Something magical is being brewed just for you... 💫',          col:'#00d4ff' },
        { at: 40, msg: 'The surprise is taking shape — keep holding! 🌟',              col:'#00ff88' },
        { at: 60, msg: 'You are getting closer... things are getting very interesting! 🔥', col:'#ffd700' },
        { at: 80, msg: 'Almost there! The surprise is nearly ready for you... 🎉',     col:'#ff8c00' },
        { at:100, msg: 'The surprise is READY! Your wait was worth it! 💕🎊',          col:'#ffffff' },
      ];

      let lastStage = -1;
      let twInterval = null;

      function getStageIdx(p) {
        let idx = 0;
        for (let i = 0; i < stageMessages.length; i++) {
          if (p >= stageMessages[i].at) idx = i;
        }
        return idx;
      }

      function typeMessage(text, color) {
        const el = document.getElementById('twLine');
        if (!el) return;
        if (twInterval) { clearInterval(twInterval); twInterval = null; }
        el.classList.remove('visible');
        el.style.color = color || 'rgba(180,210,255,0.75)';
        el.textContent = text;
        // Fade in instantly
        requestAnimationFrame(() => el.classList.add('visible'));
      }

      function updateStageDots(stageIdx, col) {
        for (let i = 0; i < 6; i++) {
          const d = document.getElementById('dot' + i);
          if (!d) continue;
          if (i <= stageIdx) {
            d.classList.add('lit');
            d.style.setProperty('--dot-col', col);
          } else {
            d.classList.remove('lit');
          }
        }
      }

      // Color stages: 0→blue, 20→cyan, 40→green, 60→yellow, 80→orange, 100→white
      const colorStages = [
        { at:  0, c1:'#3f74ee', c2:'#5f9eff', c3:'#bfdaff', glow:'#4d7cff' },
        { at: 20, c1:'#00c8e0', c2:'#40e0f0', c3:'#a0f4ff', glow:'#00d4ff' },
        { at: 40, c1:'#00cc66', c2:'#33ee88', c3:'#aaffd4', glow:'#00ff88' },
        { at: 60, c1:'#cccc00', c2:'#ffff33', c3:'#ffffaa', glow:'#ffd700' },
        { at: 80, c1:'#ff6600', c2:'#ff9933', c3:'#ffcc88', glow:'#ff8c00' },
        { at:100, c1:'#cccccc', c2:'#ffffff', c3:'#ffffff', glow:'#ffffff' },
      ];

      function getColors(p) {
        for (let i = colorStages.length - 1; i >= 0; i--) {
          if (p >= colorStages[i].at) return colorStages[i];
        }
        return colorStages[0];
      }

      function updateRingColor(p) {
        const col = getColors(p);
        // Update SVG gradient stops directly
        const stops = document.querySelectorAll('#shimmerGradient stop');
        if (stops[0]) stops[0].setAttribute('stop-color', col.c1);
        if (stops[1]) stops[1].setAttribute('stop-color', col.c2);
        if (stops[2]) stops[2].setAttribute('stop-color', col.c3);
        // Update ring glow filter color
        ringFill.style.filter = `drop-shadow(0 0 9px ${col.glow}) drop-shadow(0 0 18px ${col.glow}88)`;
        // Update ring wrapper glow
        const wrapper = document.querySelector('.ring-wrapper');
        if (wrapper) wrapper.style.filter = `drop-shadow(0 0 18px ${col.glow}70)`;
        // Update percent number color
        percentDisplay.style.background = `linear-gradient(145deg, #ffffff, ${col.c2})`;
        percentDisplay.style.webkitBackgroundClip = 'text';
        percentDisplay.style.backgroundClip = 'text';
      }

      function setProgress(percent) {
        const validPercent = Math.min(100, Math.max(0, percent));
        const offset = circumference * (1 - validPercent / 100);
        ringFill.style.strokeDashoffset = offset;
        percentDisplay.innerHTML = validPercent + '<span style="font-size:2rem;">%</span>';
        updateRingColor(validPercent);
        // Check stage transition and fire typewriter
        const stageIdx = getStageIdx(validPercent);
        if (stageIdx !== lastStage) {
          lastStage = stageIdx;
          const stage = stageMessages[stageIdx];
          typeMessage(stage.msg, stage.col);
          updateStageDots(stageIdx, stage.col);
        }
        currentProgress = validPercent;
        if (validPercent >= 100 && enableRedirection) {
          setTimeout(() => { window.location.href = 'main.html'; }, 500);
        }
      }

      // floating background dots
      const dotsContainer = document.getElementById('energyDots');
      for (let i = 0; i < 14; i++) {
        const span = document.createElement('span');
        const size = Math.floor(Math.random() * 10) + 3;
        span.style.width  = size + 'px';
        span.style.height = size + 'px';
        span.style.left   = Math.random() * 100 + '%';
        span.style.top    = Math.random() * 100 + '%';
        span.style.animation = `floatDot ${Math.random()*8+5}s infinite alternate ease-in-out`;
        span.style.animationDelay = Math.random() * 5 + 's';
        span.style.background  = `radial-gradient(circle at 30% 30%,#b4d0ff,#4865cf)`;
        span.style.opacity     = 0.2 + Math.random() * 0.5;
        span.style.boxShadow   = `0 0 ${Math.floor(10+Math.random()*30)}px #5e83ff`;
        dotsContainer.appendChild(span);
      }



      setProgress(0);
      setTimeout(() => { setProgress(90); setTimeout(()=>setProgress(0),700); }, 300);

      /* ── FINGERPRINT ── */
      const fingerprintSensor = document.getElementById('fingerprintSensor');

      function createMassEffect(isPress) {
        const sz = window.innerWidth < 400 ? '56px' : '70px';
        const ripple = document.createElement('div');
        ripple.className = 'mass-effect-ripple';
        fingerprintSensor.querySelector('.fp-circle').appendChild(ripple);
        setTimeout(() => ripple.remove(), 800);
        const wave = document.createElement('div');
        wave.className = 'mass-effect-wave';
        fingerprintSensor.querySelector('.fp-circle').appendChild(wave);
        setTimeout(() => wave.remove(), 1200);
        const count = isPress ? 12 : 6;
        for (let i = 0; i < count; i++) {
          const particle = document.createElement('div');
          particle.className = 'mass-effect-particle';
          const angle = (i / count) * Math.PI * 2;
          const dist  = isPress ? 80 + Math.random()*60 : 40 + Math.random()*30;
          particle.style.setProperty('--x', Math.cos(angle)*dist+'px');
          particle.style.setProperty('--y', Math.sin(angle)*dist+'px');
          particle.style.left = '50%'; particle.style.top = '50%';
          particle.style.transform = 'translate(-50%,-50%)';
          fingerprintSensor.querySelector('.fp-circle').appendChild(particle);
          setTimeout(() => particle.remove(), 1000);
        }
      }

      fingerprintSensor.addEventListener('mousedown',   startIncrease);
      fingerprintSensor.addEventListener('touchstart',  e=>{ e.preventDefault(); startIncrease(e); });
      fingerprintSensor.addEventListener('mouseup',     startDecrease);
      fingerprintSensor.addEventListener('touchend',    e=>{ e.preventDefault(); startDecrease(e); });
      fingerprintSensor.addEventListener('mouseleave',  startDecrease);
      fingerprintSensor.addEventListener('dblclick', () => {
        if (increaseInterval) clearInterval(increaseInterval);
        if (decreaseInterval) clearInterval(decreaseInterval);
        fingerprintSensor.classList.remove('pressed');
        setProgress(0);
        for (let i=0;i<5;i++) setTimeout(()=>createMassEffect(true),i*150);
      });
      fingerprintSensor.addEventListener('contextmenu', e=>e.preventDefault());

      function startIncrease(e) {
        if(e) e.preventDefault();
        if (decreaseInterval) { clearInterval(decreaseInterval); decreaseInterval=null; }
        if (increaseInterval) return;
        fingerprintSensor.classList.add('pressed');
        createMassEffect(true);
        increaseInterval = setInterval(() => {
          if (currentProgress < 100) { setProgress(currentProgress+1); }
          else { clearInterval(increaseInterval); increaseInterval=null; }
        }, 50);
      }

      function startDecrease(e) {
        if(e) e.preventDefault();
        if (increaseInterval) { clearInterval(increaseInterval); increaseInterval=null; }
        if (decreaseInterval) return;
        fingerprintSensor.classList.remove('pressed');
        createMassEffect(false);
        decreaseInterval = setInterval(() => {
          if (currentProgress > 0) { setProgress(currentProgress-1); }
          else { clearInterval(decreaseInterval); decreaseInterval=null; }
        }, 70);
      }

    })();
  </script>
</body>
</html>
