<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CS MEMORIES</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono&display=swap');

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    width:100%; height:100%;
    overflow:hidden;
    background:#f9f9f7;
    font-family:'Space Mono',monospace;
    touch-action:manipulation;
  }

  /* ══════════════════════════════
     LOADING SCREEN
  ══════════════════════════════ */
  #loading-screen {
    position:fixed; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:#f9f9f7; z-index:100;
    transition:opacity 0.9s ease;
  }
  #loading-screen.fade-out { opacity:0; pointer-events:none; }

  canvas#smoke {
    position:absolute; inset:0;
    width:100%; height:100%; pointer-events:none;
  }

  .load-content {
    position:relative; z-index:10;
    display:flex; flex-direction:column; align-items:center;
    padding:0 20px; width:100%;
  }

  .load-title {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(48px,13vw,140px);
    letter-spacing:0.2em; color:#111;
    line-height:1; text-align:center; user-select:none;
  }

  .load-sub {
    font-size:clamp(7px,2vw,10px); letter-spacing:0.5em;
    color:#bbb; text-transform:uppercase;
    margin-top:8px; margin-bottom:clamp(40px,8vh,72px);
  }

  .progress-wrap { width:min(260px,72vw); }
  .progress-track { width:100%; height:1px; background:#ddd; overflow:hidden; }
  .progress-bar   { height:100%; background:#111; width:0%; transition:width 0.1s linear; }
  .progress-meta  {
    display:flex; justify-content:space-between;
    margin-top:10px; font-size:8px;
    letter-spacing:0.25em; color:#ccc; text-transform:uppercase;
  }
  .progress-pct { color:#111; }

  /* ══════════════════════════════
     UNMUTE OVERLAY
  ══════════════════════════════ */
  #unmute-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.92);
    z-index:300; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:clamp(14px,4vw,24px);
    opacity:0; pointer-events:none;
    transition:opacity 0.5s ease;
    padding:20px;
  }
  #unmute-overlay.show { opacity:1; pointer-events:all; }

  .unmute-icon {
    font-size:clamp(2.5rem,12vw,5rem);
    animation:pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.15);} }

  .unmute-text {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(1.1rem,5vw,2.2rem);
    letter-spacing:0.3em; color:#fff;
    text-align:center;
  }

.unmute-btn {
  padding:clamp(10px,3vw,14px) clamp(28px,8vw,44px);
  background:linear-gradient(135deg,rgba(255,215,0,0.2),rgba(255,165,0,0.1));
  border:2px solid #ffd700;
  border-radius:50px;

  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1rem,4vw,1.6rem);
  letter-spacing:0.4em;
  color:#ffd700;

  cursor:pointer;
  box-shadow:0 0 30px rgba(255,215,0,0.4);
  transition:all 0.3s ease;

  touch-action:manipulation;

  appearance:none;          /* standard */
  -webkit-appearance:none;  /* safari/chrome */
}
  .unmute-btn:active { transform:scale(0.96); }

  /* ══════════════════════════════
     PLAYER
  ══════════════════════════════ */
  #player-screen {
    position:fixed; inset:0; background:#000;
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none;
    transition:opacity 0.9s ease;
  }
  #player-screen.active { opacity:1; pointer-events:all; }

  #main-video {
    width:100%; height:100%;
    object-fit:contain;
    display:block;
  }

  /* HUD — only counter, NO dots */
  .hud {
    position:absolute; inset:0;
    opacity:0; transition:opacity 0.4s; pointer-events:none;
  }
  #player-screen:hover .hud,
  #player-screen.hud-visible .hud { opacity:1; pointer-events:all; }

  .hud-counter {
    position:absolute; top:clamp(12px,3vw,22px); right:clamp(14px,4vw,26px);
    font-size:clamp(8px,2.5vw,11px); letter-spacing:0.3em;
    color:rgba(255,255,255,0.5);
  }

  /* ══════════════════════════════
     BLACK SCREEN
  ══════════════════════════════ */
  #black-screen {
    position:fixed; inset:0; background:#000;
    z-index:150; opacity:0; pointer-events:none;
    transition:opacity 1s ease;
  }
  #black-screen.active { opacity:1; pointer-events:all; }

  /* ══════════════════════════════
     CREDITS SCREEN
  ══════════════════════════════ */
  #credits-screen {
    position:fixed; inset:0; background:#000;
    z-index:200; opacity:0; pointer-events:none;
    transition:opacity 1.5s ease;
    overflow:hidden;
  }
  #credits-screen.active { opacity:1; pointer-events:all; }

  /* CRT scanlines — using canvas instead of pseudo to work on all mobile */
  #crt-canvas {
    position:fixed; inset:0; z-index:1; pointer-events:none;
    width:100%; height:100%; opacity:0.18;
  }

  /* Top + bottom fade masks */
  #credits-screen::after {
    content:''; position:fixed; inset:0;
    z-index:3; pointer-events:none;
    background:
      linear-gradient(to bottom, #000 0%, transparent 10%),
      linear-gradient(to top,    #000 0%, transparent 10%);
  }

  /* Scrolling reel */
  #credits-reel {
    position:absolute;
    left:50%; transform:translateX(-50%);
    width:min(680px,94vw);
    text-align:center;
    z-index:2;
    padding-bottom:100vh;
    top:100vh;
    padding-left:clamp(8px,3vw,20px);
    padding-right:clamp(8px,3vw,20px);
  }

  /* Typewriter cursor */
  .tw-cursor {
    display:inline-block; width:2px; height:0.9em;
    background:#ffd700; vertical-align:middle; margin-left:2px;
    animation:twBlink 0.55s step-end infinite;
    box-shadow:0 0 10px #ffd700;
  }
  @keyframes twBlink { 50%{opacity:0;} }

  /* THE END */
  .c-the-end {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(2.8rem,14vw,7rem);
    letter-spacing:0.2em;
    background:linear-gradient(135deg,#ffd700,#ffaa00,#ff7b00,#ff5500,#ffaa00,#ffd700);
    background-size:400%;
    background-clip:text; -webkit-background-clip:text;
    color:transparent; -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 30px rgba(255,215,0,0.8));
    animation:theEndShimmer 4s linear infinite;
    line-height:1; display:block;
    margin-bottom:clamp(28px,6vw,52px);
  }
  @keyframes theEndShimmer {
    0%{background-position:0% 50%} 100%{background-position:400% 50%}
  }

  /* Dividers */
  .c-div {
    width:min(380px,80%); height:1px; margin:clamp(16px,4vw,30px) auto;
    background:linear-gradient(90deg,transparent,rgba(255,215,0,0.3),rgba(255,255,255,0.5),rgba(255,215,0,0.3),transparent);
  }
  .c-div.gold {
    background:linear-gradient(90deg,transparent,rgba(255,215,0,0.6),#ffd700,rgba(255,215,0,0.6),transparent);
    height:2px; box-shadow:0 0 20px rgba(255,215,0,0.4);
  }

  /* Section headings */
  .c-heading {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(0.75rem,3.5vw,1.4rem);
    letter-spacing:clamp(0.2em,1.5vw,0.6em);
    color:#ffffff;
    text-transform:uppercase;
    margin-bottom:clamp(12px,3vw,22px);
    min-height:1em;
    text-shadow:0 0 20px rgba(255,255,255,0.5), 0 0 40px rgba(255,215,0,0.3);
    opacity:0.95;
  }

  /* Credit rows */
  .c-grid { display:flex; flex-direction:column; gap:0; }

  .c-row {
    display:flex; justify-content:space-between; align-items:center;
    padding:clamp(10px,3vw,14px) 0;
    border-bottom:1px solid rgba(255,215,0,0.15);
    transition:all 0.3s ease;
    gap:8px;
  }
  .c-row:last-child { border-bottom:none; }

  .c-role {
    font-family:'Space Mono',monospace;
    font-size:clamp(0.5rem,2.2vw,0.75rem);
    letter-spacing:clamp(0.1em,0.8vw,0.36em);
    color:#e0e0e0;
    text-transform:uppercase; min-height:1em;
    text-shadow:0 0 15px rgba(255,255,255,0.3);
    font-weight:300; flex-shrink:0;
  }

  .c-name {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(1.1rem,5.5vw,2rem);
    letter-spacing:clamp(0.05em,0.5vw,0.16em);
    min-height:1em; text-align:right;
  }
  .c-name.n1 { color:#ffd700; text-shadow:0 0 30px rgba(255,215,0,0.8),0 0 60px rgba(255,215,0,0.4); }
  .c-name.n2 { color:#00ffff; text-shadow:0 0 30px rgba(0,255,255,0.8),0 0 60px rgba(0,255,255,0.4); }
  .c-name.n3 { color:#ff69b4; text-shadow:0 0 30px rgba(255,105,180,0.8),0 0 60px rgba(255,105,180,0.4); }
  .c-name.n4 { color:#7fffd4; text-shadow:0 0 30px rgba(127,255,212,0.8),0 0 60px rgba(127,255,212,0.4); }

  /* Body text */
  .c-body {
    font-family:'Space Mono',monospace;
    font-size:clamp(0.6rem,2.8vw,0.9rem);
    line-height:2.2; color:#ffffff;
    font-style:italic; min-height:1em;
    background:linear-gradient(135deg,#ffffff,#f0f0f0);
    background-clip:text; -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    font-weight:500;
  }

  /* Special thanks box */
  .c-special-box {
    background:rgba(255,215,0,0.08);
    border:1px solid rgba(255,215,0,0.3);
    border-left:4px solid #ffd700;
    border-radius:8px;
    padding:clamp(12px,3.5vw,26px) clamp(12px,3.5vw,28px);
    text-align:left;
    font-family:'Space Mono',monospace;
    font-size:clamp(0.55rem,2.5vw,0.85rem);
    line-height:2.3; color:#f0f0f0;
    min-height:1em;
    box-shadow:0 0 30px rgba(255,215,0,0.2);
  }
  .c-special-box strong {
    color:#ffd700;
    text-shadow:0 0 20px rgba(255,215,0,0.6);
    font-weight:bold;
  }

  /* Final message */
  .c-final {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(1rem,5vw,2.2rem);
    letter-spacing:clamp(0.08em,0.8vw,0.2em);
    color:#ffffff; line-height:1.8; min-height:1em;
    background:linear-gradient(135deg,#ffffff,#fff5e6);
    background-clip:text; -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
  }

  /* Memorable quote */
  .c-quote {
    font-family:'Space Mono',monospace;
    font-size:clamp(0.6rem,2.5vw,0.9rem);
    font-style:italic; color:#f5f5f5;
    line-height:2.2;
    padding:clamp(16px,4vw,28px) 0;
    border-top:1px solid rgba(255,215,0,0.3);
    border-bottom:1px solid rgba(255,215,0,0.3);
    min-height:1em;
    text-shadow:0 0 20px rgba(255,255,255,0.3);
    letter-spacing:0.03em;
  }

  /* ══════════════════════════════
     BACK BUTTON — only shows after credits end
  ══════════════════════════════ */
  #back-button-container {
    position:fixed;
    bottom:clamp(70px,12vw,100px);
    left:50%; transform:translateX(-50%);
    z-index:500;
    opacity:0; pointer-events:none;
    transition:opacity 1s ease;
    text-align:center;
    width:90%;
  }
  #back-button-container.visible { opacity:1; pointer-events:all; }

.back-btn {
  display:inline-block;
  padding:clamp(12px,3.5vw,16px) clamp(24px,7vw,48px);
  background:linear-gradient(135deg,rgba(255,215,0,0.15),rgba(255,255,255,0.05));
  border:2px solid #ffd700;
  border-radius:60px;

  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1rem,4.5vw,2rem);
  letter-spacing:clamp(0.15em,1vw,0.4em);

  color:#ffd700;
  text-decoration:none;
  text-transform:uppercase;

  cursor:pointer;
  backdrop-filter:blur(10px);

  box-shadow:0 0 40px rgba(255,215,0,0.4),0 0 80px rgba(255,215,0,0.2);
  transition:all 0.4s ease;

  appearance:none;
  -webkit-appearance:none;

  touch-action:manipulation;
  white-space:nowrap;
}
  .back-btn:active { transform:scale(0.97); opacity:0.85; }

  /* ══════════════════════════════
     DESIGNER BADGE — fixed bottom-left
  ══════════════════════════════ */
  #designer-badge {
    position:fixed;
    bottom:clamp(14px,3vw,24px);
    left:clamp(10px,3vw,24px);
    z-index:500;
    opacity:0; pointer-events:none;
    transition:opacity 1.2s ease;
  }
  #designer-badge.visible { opacity:1; pointer-events:all; }

  .designer-link {
    display:inline-flex; align-items:center; gap:clamp(5px,1.5vw,8px);
    text-decoration:none;
    padding:clamp(6px,2vw,9px) clamp(10px,3vw,16px);
    background:rgba(0,0,0,0.55);
    border:1px solid rgba(255,215,0,0.35); border-radius:40px;
    backdrop-filter:blur(10px);
    transition:all 0.3s ease;
    touch-action:manipulation;
  }
  .designer-link:active { transform:scale(0.96); }
  .designer-link:hover  { border-color:rgba(255,215,0,0.7); background:rgba(0,0,0,0.7); }

  .designer-dot {
    width:clamp(5px,1.5vw,7px); height:clamp(5px,1.5vw,7px);
    border-radius:50%; background:#ffd700;
    box-shadow:0 0 8px #ffd700; flex-shrink:0;
    animation:dpulse 2s ease-in-out infinite;
  }
  @keyframes dpulse {
    0%,100%{box-shadow:0 0 4px #ffd700; transform:scale(1);}
    50%{box-shadow:0 0 12px #ffd700,0 0 24px rgba(255,215,0,0.4); transform:scale(1.25);}
  }

  .designer-label {
    font-family:'Space Mono',monospace;
    font-size:clamp(0.42rem,1.6vw,0.58rem);
    letter-spacing:0.25em; color:rgba(255,255,255,0.45);
    text-transform:uppercase; white-space:nowrap;
  }

  .designer-name {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(0.75rem,3.2vw,1.05rem);
    letter-spacing:0.22em;
    background:linear-gradient(135deg,#ffd700,#ffee88,#ffd700);
    background-size:200%;
    background-clip:text; -webkit-background-clip:text;
    color:transparent; -webkit-text-fill-color:transparent;
    animation:goldShine 3s linear infinite;
    white-space:nowrap;
  }
  @keyframes goldShine { 0%{background-position:0%} 100%{background-position:200%} }

  /* Fade veil */
  #credits-fade {
    position:fixed; inset:0; background:#000;
    z-index:400; opacity:0; pointer-events:none;
    transition:opacity 3s ease;
  }
  #credits-fade.on { opacity:0.7; }
</style>
</head>

  <div id="credits-reel">

    <div class="c-the-end" id="cTheEnd"></div>

<script>
/* ══════════════════════════════════════
   CONFIG
══════════════════════════════════════ */
 const VIDEO_URLS = [
  "https://res.cloudinary.com/deatzzrsw/video/upload/v1773795753/saro1_asufyu.mp4",
  "https://res.cloudinary.com/deatzzrsw/video/upload/v1773795721/saro2_xkwbs9.mp4",
  "https://res.cloudinary.com/deatzzrsw/video/upload/v1773795717/saro3_rjc25a.mp4",
  "https://res.cloudinary.com/deatzzrsw/video/upload/v1773795622/saro4_wdep95.mp4"
];


/* ══════════════════════════════════════
   DEVICE DETECT
══════════════════════════════════════ */
const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)
               || window.innerWidth < 1024;
let userInteracted = false;

/* ══════════════════════════════════════
   CRT SCANLINES — canvas-based (works on
   all mobiles, no ::before glitch)
══════════════════════════════════════ */
(function initCRT(){
  const c  = document.getElementById('crt-canvas');
  const cx = c.getContext('2d');
  function drawCRT(){
    c.width  = window.innerWidth;
    c.height = window.innerHeight;
    cx.clearRect(0,0,c.width,c.height);
    for(let y=0; y<c.height; y+=4){
      cx.fillStyle='rgba(0,0,0,0.55)';
      cx.fillRect(0,y+2,c.width,2);
    }
  }
  drawCRT();
  window.addEventListener('resize', drawCRT);
  window.addEventListener('orientationchange', ()=>setTimeout(drawCRT,300));
})();

/* ══════════════════════════════════════
   WAKE LOCK
══════════════════════════════════════ */
let wakeLock = null;
async function grabWakeLock(){
  if(!('wakeLock' in navigator)) return;
  try{
    if(wakeLock && !wakeLock.released) return;
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release',()=>setTimeout(grabWakeLock,800));
  }catch(e){}
}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible') grabWakeLock();
});
setInterval(grabWakeLock,20000);

/* ══════════════════════════════════════
   FULLSCREEN
══════════════════════════════════════ */
function goFullscreen(){
  const el = document.documentElement;
  const fn = el.requestFullscreen || el.webkitRequestFullscreen
           || el.mozRequestFullScreen || el.msRequestFullscreen;
  if(fn) fn.call(el).catch(()=>{});
}
['fullscreenchange','webkitfullscreenchange','mozfullscreenchange'].forEach(ev=>{
  document.addEventListener(ev,()=>{
    const full = document.fullscreenElement
              || document.webkitFullscreenElement
              || document.mozFullScreenElement;
    if(!full && userInteracted) setTimeout(goFullscreen,600);
  });
});
function onFirstInteraction(){
  if(userInteracted) return;
  userInteracted = true;
  goFullscreen();
  grabWakeLock();
}

/* ══════════════════════════════════════
   SMOKE
══════════════════════════════════════ */
const smokeCanvas = document.getElementById('smoke');
const sCtx = smokeCanvas.getContext('2d');
function resizeSmoke(){
  smokeCanvas.width  = window.innerWidth;
  smokeCanvas.height = window.innerHeight;
}
resizeSmoke();
window.addEventListener('resize', resizeSmoke);

class Puff{
  constructor(i){ this.spawn(i); }
  spawn(i){
    this.x  = Math.random()*smokeCanvas.width;
    this.y  = i ? Math.random()*smokeCanvas.height : smokeCanvas.height+30;
    this.r  = 90+Math.random()*140; this.a=0;
    this.ta = 0.016+Math.random()*0.03;
    this.vx = (Math.random()-0.5)*0.14;
    this.vy = -(0.08+Math.random()*0.18);
    this.age=0; this.max=280+Math.random()*200;
  }
  tick(){
    this.age++; this.x+=this.vx; this.y+=this.vy;
    const t=this.age/this.max;
    this.a=t<0.2?(t/0.2)*this.ta:t>0.75?((1-t)/0.25)*this.ta:this.ta;
    if(this.age>=this.max) this.spawn(false);
  }
  draw(){
    const g=sCtx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r);
    g.addColorStop(0,`rgba(180,170,150,${this.a})`);
    g.addColorStop(1,`rgba(160,158,152,0)`);
    sCtx.fillStyle=g; sCtx.beginPath();
    sCtx.arc(this.x,this.y,this.r,0,Math.PI*2); sCtx.fill();
  }
}
const puffs=Array.from({length:32},(_,i)=>new Puff(true));
(function smokeLoop(){
  sCtx.clearRect(0,0,smokeCanvas.width,smokeCanvas.height);
  puffs.forEach(p=>{p.tick();p.draw();});
  requestAnimationFrame(smokeLoop);
})();

/* ══════════════════════════════════════
   PRELOAD + PROGRESS
══════════════════════════════════════ */
let loaded=0, progress=0;
const pbar=document.getElementById('pbar');
const pnum=document.getElementById('pnum');

VIDEO_URLS.forEach(url=>{
  const v=document.createElement('video');
  v.src=url; v.preload='auto'; v.muted=true; v.load();
  const mark=()=>{ loaded=Math.min(loaded+1,VIDEO_URLS.length); };
  v.addEventListener('canplaythrough',mark,{once:true});
  v.addEventListener('loadeddata',mark,{once:true});
  if(v.readyState>=3) mark();
});

const ticker=setInterval(()=>{
  const done=loaded>=VIDEO_URLS.length;
  const step=progress<55?1.6:progress<80?0.7:0.25;
  progress=Math.min(progress+step,done?100:85);
  if(done) progress=Math.min(progress+2,100);
  pbar.style.width=progress+'%';
  pnum.textContent=Math.floor(progress)+'%';
  if(progress>=100){ clearInterval(ticker); setTimeout(launch,500); }
},40);

/* ══════════════════════════════════════
   LAUNCH

function launch(){
  loadScr.classList.add('fade-out');
  setTimeout(()=>{
    loadScr.style.display='none';

      unmuteOverlay.classList.add('show');
      unmuteBtn.addEventListener('click',()=>{
        onFirstInteraction();
        unmuteOverlay.classList.remove('show');
        setTimeout(()=>{ unmuteOverlay.style.display='none'; },600);
        playVideo(0);
      },{once:true});
    } else {
      onFirstInteraction();
      playVideo(0);
    }
  },900);
}

/* ══════════════════════════════════════
   VIDEO PLAYER
══════════════════════════════════════ */
function playVideo(idx){
  currentIdx=idx;
  document.getElementById('counter').textContent=
    String(idx+1).padStart(2,'0')+' / '+String(VIDEO_URLS.length).padStart(2,'0');
  mainVideo.src=VIDEO_URLS[idx];
  mainVideo.load();
  mainVideo.addEventListener('canplay',()=>{
    mainVideo.muted=false;
    mainVideo.play().catch(()=>{ mainVideo.muted=true; mainVideo.play(); });
  },{once:true});
  mainVideo.onended=()=>{
    if(idx+1<VIDEO_URLS.length) playVideo(idx+1);
    else showCredits();
  };
}

/* ══════════════════════════════════════
   TYPEWRITER ENGINE
══════════════════════════════════════ */
function typeInto(el, html, speed){
  return new Promise(resolve=>{
    el.innerHTML='';
    const parts=html.split(/(<br>|<br\/>|<strong>|<\/strong>)/g);
    let queue=[], inStrong=false;
    for(let p of parts){
      if(p==='<strong>'){ inStrong=true; continue; }
      if(p==='</strong>'){ inStrong=false; continue; }
      if(p==='<br>'||p==='<br/>'){ queue.push({type:'br'}); }
      else { for(let c of [...p]) queue.push({type:'char',char:c,bold:inStrong}); }
    }
    let i=0;
    const cur=document.createElement('span');
    cur.className='tw-cursor'; el.appendChild(cur);
    function next(){
      if(i>=queue.length){ cur.remove(); resolve(); return; }
      const item=queue[i++];
      if(item.type==='br'){
        cur.insertAdjacentElement('beforebegin',document.createElement('br'));
        setTimeout(next,speed*2);
      } else {
        const s=document.createElement(item.bold?'strong':'span');
        s.textContent=item.char;
        cur.insertAdjacentElement('beforebegin',s);
        let d=speed;
        if(item.char===' ') d*=0.3;
        else if(item.char==='.') d*=1.5;
        else if(item.char===',') d*=0.8;
        setTimeout(next,d);
      }
    }
    next();
  });
}

/* ══════════════════════════════════════
   SCROLL ENGINE
   Speed: mobile=3.5px/frame  desktop=2.8px/frame
   (faster on mobile as requested)
══════════════════════════════════════ */
let currentReelY=0;

function scrollToEl(el){
  return new Promise(resolve=>{
    const reel  = document.getElementById('credits-reel');
    const rect  = el.getBoundingClientRect();
    const delta = rect.top - window.innerHeight * 0.32;
    const dist  = Math.abs(delta);
    if(dist<2){ resolve(); return; }

    /* Mobile gets faster scroll speed */
    const SPEED = isMobile ? 3.5 : 2.8;
    const steps = Math.ceil(dist/SPEED);
    let step=0;
    const dir = delta>0 ? 1 : -1;

    (function tick(){
      step++;
      currentReelY += SPEED * dir;
      reel.style.top = (window.innerHeight - currentReelY) + 'px';
      if(step<steps) requestAnimationFrame(tick);
      else resolve();
    })();
  });
}
